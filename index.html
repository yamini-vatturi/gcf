<!DOCTYPE html>
<html>
    <head>
        <title>External javascript example</title>
    </head>
    <body>
        <button style="color: rgb(12, 37, 83); background-color: rgb(238, 158, 198);"
        onclick="myFunction()">Click me</button>
        <p id="demo"></p>
        <script>
    function myFunction(){
        const name="yamini";
      document.getElementById("demo").innerHTML="Hello " + name + " !";
    }
        </script>
    </body>
</html>
